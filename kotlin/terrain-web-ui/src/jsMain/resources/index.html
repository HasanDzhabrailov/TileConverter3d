<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terrain Converter</title>
    <link rel="stylesheet" href="/app.css" />
    <link rel="stylesheet" href="/maplibre-gl.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="/terrain-web-ui.js"></script>
    <script>
      // Регистрация Service Worker для кэширования тайлов
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(registration) {
              console.log('[App] ServiceWorker зарегистрирован:', registration.scope);
            })
            .catch(function(error) {
              console.log('[App] Ошибка регистрации ServiceWorker:', error);
            });
        });
      }
    </script>
  </body>
  </html>
